<!DOCTYPE html>
<html>

<head>

<title>AutoAdvocate - Diagnosis</title>

<style>

body {
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    padding:40px;
}

.container {
    max-width:700px;
    background:white;
    margin:auto;
    padding:30px;
    border-radius:15px;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
}

.report {
    margin-top:25px;
    padding:20px;
    background:#eef2ff;
    border-radius:10px;
}

</style>

</head>


<body>
<nav style="
background:#111827;
padding:15px;
">

<a href="index.html" style="color:white;margin:15px;">
Home
</a>

<a href="pages/vehicle.html" style="color:white;margin:15px;">
My Vehicle
</a>

<a href="pages/diagnosis.html" style="color:white;margin:15px;">
Diagnostics
</a>

<a href="pages/estimate.html" style="color:white;margin:15px;">
Repair Review
</a>

</nav>

<div class="container">


<h1>Diagnostic Assistant</h1>

<p>
Enter your trouble code and AutoAdvocate will explain what it means.
</p>


<input id="code" placeholder="Example: P0302">


<button onclick="analyzeCode()">
Analyze Problem
</button>


<div class="report" id="report">

</div>


</div>



<script>


function analyzeCode(){

let code=document.getElementById("code").value.toUpperCase();

let report=document.getElementById("report");


if(code==="P0302"){

report.innerHTML=`

<h2>P0302 - Cylinder 2 Misfire</h2>


<b>What this means:</b>

<p>
Your vehicle computer detected that cylinder #2
is not producing the expected combustion.
</p>


<b>Most likely causes:</b>

<ul>
<li>Ignition coil failure</li>
<li>Worn spark plug</li>
<li>Fuel injector problem</li>
<li>Vacuum leak</li>
<li>Compression issue</li>
</ul>


<b>Recommended first test:</b>

<p>
Swap the ignition coil from cylinder #2
with another cylinder. Clear the code and drive.
If the misfire moves, the coil is likely bad.
</p>


<b>Questions to ask a mechanic:</b>

<ul>
<li>What test confirmed this part failed?</li>
<li>Was the ignition system tested?</li>
<li>What other causes were ruled out?</li>
</ul>

`;

}

else {

report.innerHTML=`

<h2>${code}</h2>

<p>
This code is not in our prototype database yet.
Future versions will analyze thousands of codes.
</p>

`;

}


}


</script>


</body>

</html>
